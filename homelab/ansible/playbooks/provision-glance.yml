---
# Provision the Glance front-door dashboard on oneill: a single static Go binary
# (pinned release) + one rendered glance.yml, unprivileged LXC, hardened systemd
# unit (ADR-014). Stateless — the config is rendered from group_vars, nothing to
# back up; a rebuild restores it fully. Idempotent.
#
# Run from the mgmt-vm, inside homelab/ansible/, targeting oneill:
#   ansible-playbook playbooks/provision-glance.yml --limit oneill
#
# Dashboard has Overview, Media, and Infrastructure pages rendered from glance.yml.j2. Metrics
# arrive via Prometheus; optional live media APIs use systemd credentials. Vars:
# glance_* + glance_prometheus_url/glance_hosts in group_vars. LAN/Tailscale only (no auth, same
# posture as Grafana/Prometheus). Glance on :{{ glance_port }}.

- name: Provision Glance dashboard LXC (front-door)
  hosts: oneill
  gather_facts: false

  tasks:
    # --- The LXC ---
    - name: Check whether CT {{ glance_ctid }} already exists
      ansible.builtin.command: "pct status {{ glance_ctid }}"
      register: ct_status
      changed_when: false
      failed_when: false

    - name: Ensure Debian template is downloaded
      ansible.builtin.command: "pveam download {{ template_store }} {{ lxc_template }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ lxc_template }}"
      when: ct_status.rc != 0

    - name: Create unprivileged Glance LXC
      ansible.builtin.command: >
        pct create {{ glance_ctid }} {{ template_store }}:vztmpl/{{ lxc_template }}
        --hostname {{ glance_hostname }}
        --cores {{ glance_cores }}
        --memory {{ glance_ram_mb }}
        --swap 0
        --rootfs {{ rootfs_storage }}:{{ glance_disk_gb }}
        --net0 name=eth0,bridge={{ bridge }},ip={{ glance_ip }},gw={{ gateway }}
        --unprivileged 1
        --features nesting=1
        --onboot 1
        --startup order=4,up=5
      when: ct_status.rc != 0

    - name: Ensure CT is running
      ansible.builtin.command: "pct start {{ glance_ctid }}"
      register: ct_start
      changed_when: "'already running' not in (ct_start.stderr | default(''))"
      failed_when:
        - ct_start.rc != 0
        - "'already running' not in (ct_start.stderr | default(''))"

    - name: Wait for the CT to be responsive
      ansible.builtin.command: "pct exec {{ glance_ctid }} -- true"
      register: ct_ready
      until: ct_ready.rc == 0
      retries: 15
      delay: 3
      changed_when: false

    - name: Ensure curl + ca-certificates are present (binary fetch + dashboard icons)
      ansible.builtin.shell: |
        pct exec {{ glance_ctid }} -- bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v curl >/dev/null; then
            apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
          fi
        '
      changed_when: true

    # --- Glance binary (pinned release, extracted from the tarball) ---
    - name: Read the installed Glance version marker (if any)
      ansible.builtin.command: "pct exec {{ glance_ctid }} -- cat /opt/glance/.version"
      register: glance_have
      changed_when: false
      failed_when: false

    - name: Download + install the pinned Glance binary
      ansible.builtin.shell: |
        pct exec {{ glance_ctid }} -- bash -c '
          set -e
          mkdir -p /opt/glance
          curl -fsSL "https://github.com/glanceapp/glance/releases/download/{{ glance_version }}/glance-linux-amd64.tar.gz" -o /tmp/glance.tar.gz
          tar -xzf /tmp/glance.tar.gz -C /opt/glance glance
          chmod +x /opt/glance/glance
          rm -f /tmp/glance.tar.gz
          echo "{{ glance_version }}" > /opt/glance/.version
        '
      when: glance_have.stdout | trim != glance_version
      changed_when: true

    # --- Config (three-page dashboard rendered from the committed Jinja template) ---
    # The template uses custom Jinja delimiters (<< >> / <% %>) so Glance's own Go-template {{ }}
    # pass through; only IPs/version/port are substituted from group_vars (ADR-014).
    - name: Render glance.yml from the template to a temp file on oneill
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/glance/glance.yml.j2"
        dest: /tmp/glance.yml.rendered
        mode: "0644"

    - name: Stage the rendered glance.yml inside the CT
      ansible.builtin.shell: |
        pct exec {{ glance_ctid }} -- mkdir -p /etc/glance
        pct push {{ glance_ctid }} /tmp/glance.yml.rendered /etc/glance/glance.yml.new --perms 644
        rm -f /tmp/glance.yml.rendered
      changed_when: true

    - name: Stage the operator dashboard stylesheet on oneill
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/glance/operator.css"
        dest: /tmp/glance-operator.css
        mode: "0644"

    - name: Install the operator dashboard stylesheet inside the CT
      ansible.builtin.shell: |
        pct exec {{ glance_ctid }} -- mkdir -p /etc/glance/assets
        pct push {{ glance_ctid }} /tmp/glance-operator.css /etc/glance/assets/operator.css --perms 644
        rm -f /tmp/glance-operator.css
      changed_when: true

    - name: Validate optional Media API credential inputs
      ansible.builtin.assert:
        that:
          - glance_media_jellyfin_api_key | default('') | length > 0
          - glance_media_sonarr_api_key | default('') | length > 0
          - glance_media_radarr_api_key | default('') | length > 0
        fail_msg: >-
          glance_media_api_enabled requires Jellyfin, Sonarr, and Radarr API keys in the
          gitignored group_vars/all.yml.
      when: glance_media_api_enabled | default(false)
      no_log: true

    - name: Create the root-only Glance credential source directory
      ansible.builtin.command: >-
        pct exec {{ glance_ctid }} -- install -d -m 0700 /etc/glance/credentials
      changed_when: true
      when: glance_media_api_enabled | default(false)

    - name: Install root-only Media API credential sources
      when: glance_media_api_enabled | default(false)
      block:
        - name: Create a root-only credential staging directory on oneill
          ansible.builtin.tempfile:
            state: directory
            prefix: glance-media-credentials-
          register: glance_credential_stage

        - name: Stage Media API credentials on oneill
          ansible.builtin.copy:
            dest: "{{ glance_credential_stage.path }}/{{ item.name }}"
            content: "{{ item.value }}"
            mode: "0600"
          loop:
            - { name: jellyfin-api-key, value: "{{ glance_media_jellyfin_api_key | default('') }}" }
            - { name: sonarr-api-key, value: "{{ glance_media_sonarr_api_key | default('') }}" }
            - { name: radarr-api-key, value: "{{ glance_media_radarr_api_key | default('') }}" }
          no_log: true

        - name: Push Media API credentials into the Glance CT
          ansible.builtin.command: >-
            pct push {{ glance_ctid }} {{ glance_credential_stage.path }}/{{ item.name }}
            /etc/glance/credentials/{{ item.name }} --perms 600
          loop:
            - { name: jellyfin-api-key }
            - { name: sonarr-api-key }
            - { name: radarr-api-key }
          changed_when: true
          no_log: true
      always:
        - name: Remove the credential staging directory from oneill
          ansible.builtin.file:
            path: "{{ glance_credential_stage.path }}"
            state: absent
          when: glance_credential_stage is defined
          no_log: true

    - name: Check for disabled Media API credential sources
      ansible.builtin.command: >-
        pct exec {{ glance_ctid }} -- test ! -e /etc/glance/credentials/jellyfin-api-key
        -a ! -e /etc/glance/credentials/sonarr-api-key
        -a ! -e /etc/glance/credentials/radarr-api-key
      register: disabled_media_credentials_absent
      when: not (glance_media_api_enabled | default(false))
      changed_when: false
      failed_when: false
      no_log: true

    - name: Remove disabled Media API credential sources
      ansible.builtin.command: >-
        pct exec {{ glance_ctid }} -- rm -f
        /etc/glance/credentials/jellyfin-api-key
        /etc/glance/credentials/sonarr-api-key
        /etc/glance/credentials/radarr-api-key
      when:
        - not (glance_media_api_enabled | default(false))
        - disabled_media_credentials_absent.rc != 0
      changed_when: true
      no_log: true

    - name: Install the Glance systemd unit (hardened, DynamicUser)
      ansible.builtin.shell: >
        echo '{{ glance_unit | b64encode }}' | base64 -d |
        pct exec {{ glance_ctid }} -- bash -c 'cat > /etc/systemd/system/glance.service'
      vars:
        glance_unit: |
          [Unit]
          Description=Glance dashboard
          After=network-online.target
          Wants=network-online.target
          [Service]
          {% if glance_media_api_enabled | default(false) %}
          LoadCredential=jellyfin-api-key:/etc/glance/credentials/jellyfin-api-key
          LoadCredential=sonarr-api-key:/etc/glance/credentials/sonarr-api-key
          LoadCredential=radarr-api-key:/etc/glance/credentials/radarr-api-key
          Environment=GLANCE_JELLYFIN_API_KEY_FILE=%d/jellyfin-api-key
          Environment=GLANCE_SONARR_API_KEY_FILE=%d/sonarr-api-key
          Environment=GLANCE_RADARR_API_KEY_FILE=%d/radarr-api-key
          {% endif %}
          ExecStart=/opt/glance/glance --config /etc/glance/glance.yml
          Restart=on-failure
          DynamicUser=yes
          NoNewPrivileges=yes
          ProtectSystem=strict
          ProtectHome=yes
          PrivateTmp=yes
          [Install]
          WantedBy=multi-user.target
      changed_when: true

    - name: Validate the staged config without Media API credentials
      ansible.builtin.command: >
        pct exec {{ glance_ctid }} -- /opt/glance/glance --config /etc/glance/glance.yml.new config:print
      changed_when: false
      when: not (glance_media_api_enabled | default(false))

    - name: Validate the staged config with root-only Media API credentials
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ glance_ctid }}"
          - "--"
          - env
          - GLANCE_JELLYFIN_API_KEY_FILE=/etc/glance/credentials/jellyfin-api-key
          - GLANCE_SONARR_API_KEY_FILE=/etc/glance/credentials/sonarr-api-key
          - GLANCE_RADARR_API_KEY_FILE=/etc/glance/credentials/radarr-api-key
          - /opt/glance/glance
          - --config
          - /etc/glance/glance.yml.new
          - config:print
      changed_when: false
      when: glance_media_api_enabled | default(false)
      no_log: true

    - name: Promote the validated config into place
      ansible.builtin.command: >
        pct exec {{ glance_ctid }} -- mv /etc/glance/glance.yml.new /etc/glance/glance.yml
      changed_when: true

    - name: Enable + (re)start Glance
      ansible.builtin.shell: |
        pct exec {{ glance_ctid }} -- bash -c '
          systemctl daemon-reload
          systemctl enable --now glance >/dev/null 2>&1
          systemctl restart glance
        '
      changed_when: true

    - name: Confirm Glance is serving
      ansible.builtin.command: >
        pct exec {{ glance_ctid }} -- bash -c 'sleep 1; curl -fsS -o /dev/null -w "%{http_code}" http://localhost:{{ glance_port }}/'
      register: glance_http
      retries: 5
      delay: 2
      until: glance_http.stdout == "200"
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg:
          - "Glance CT {{ glance_ctid }} up at {{ glance_ip | regex_replace('/.*$', '') }}:{{ glance_port }} (HTTP {{ glance_http.stdout }})."
          - "Three-page dashboard rendered from templates/glance/glance.yml.j2 — LAN/Tailscale only, no auth."
          - "Live Media API insights: {{ glance_media_api_enabled | default(false) | ternary('enabled', 'disabled; storage inventory remains available') }}."
          - "Pinned {{ glance_version }}. Reserve {{ glance_ip | regex_replace('/.*$', '') }} in UniFi."
