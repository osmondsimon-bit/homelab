---
# Provision the Technitium DNS resolver LXC(s) on Proxmox — DNS-only resolvers with
# ad/tracker blocking (see decisions/011-dns-engine.md). UniFi keeps DHCP and hands
# these CTs out as the network resolvers; the cutover is documented in
# docs/operations/runbooks.md. Idempotent — safe to re-run.
#
# MULTI-INSTANCE (DNS redundancy): the resolvers are defined declaratively in
# `technitium_instances` (group_vars) — one entry per CT, each pinned to a node
# ({ ctid, hostname, ip, node, rootfs_storage }). The per-instance logic lives in
# tasks/technitium-instance.yml and is included once per entry, guarded so each CT
# is created on its own node. Shared shape/config (cores/ram/disk, forwarders,
# blocklists) come from the global technitium_* vars, so every resolver stays
# config-identical. Run with `--limit <node>` to (re)converge just one instance.
#
# Run from the mgmt-vm (control node), inside homelab/ansible/:
#   ansible-playbook playbooks/provision-technitium.yml                 # all instances
#   ansible-playbook playbooks/provision-technitium.yml --limit carter  # just the carter one
#
# You'll be prompted for the admin console password. It is set via the Technitium
# API on first install only and is never stored (no_log). On later re-runs the
# password step is skipped (the default admin/admin no longer applies). When
# (re)converging an EXISTING instance, the prompt value must match that instance's
# current admin password (it's used to log in and apply config).
#
# The CT lifecycle is driven via `pct` over SSH to the Proxmox host (single
# credential), consistent with the Tailscale playbook; migration of LXC creation to
# Terraform is planned (ADR-008).

- name: Provision Technitium DNS resolver LXC(s) — DNS-only, redundant
  hosts: proxmox
  gather_facts: false

  vars_prompt:
    - name: tech_admin_password
      prompt: "Technitium admin console password (set on first install; must match existing on re-converge)"
      private: true

  tasks:
    - name: Validate admin password is reasonable
      ansible.builtin.assert:
        that: tech_admin_password | length >= 12
        fail_msg: "Use at least 12 characters for the Technitium admin password."
        quiet: true

    - name: Provision + configure each Technitium instance on its node
      ansible.builtin.include_tasks: tasks/technitium-instance.yml
      loop: "{{ technitium_instances }}"
      loop_control:
        loop_var: instance
        label: "{{ instance.hostname }} (CT {{ instance.ctid }}) on {{ instance.node }}"
      when: instance.node == inventory_hostname

    - name: Reminder — DHCP + onboarding
      ansible.builtin.debug:
        msg:
          - "Resolvers provisioned. NEXT (see docs/operations/runbooks.md):"
          - "  1. Reserve each instance IP in UniFi."
          - "  2. Hand BOTH out on the home-VLAN DHCP (primary + secondary DNS) for redundancy."
          - "  3. Dashboards/alerts already cover each CT (Glance tile + GuestDown via pve_up)."
