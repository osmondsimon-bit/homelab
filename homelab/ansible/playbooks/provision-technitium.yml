---
# Provision the Technitium DNS LXC on Proxmox as a DNS-only resolver with
# ad/tracker blocking (see decisions/011-dns-engine.md). UniFi keeps DHCP and
# hands this CT out as the network resolver — the cutover is documented in
# docs/operations/runbooks.md. Idempotent — safe to re-run.
#
# Run from the mgmt-vm (control node), inside homelab/ansible/:
#   ansible-playbook playbooks/provision-technitium.yml
#
# You'll be prompted for an admin console password. It is set via the Technitium
# API on first install only and is never stored (no_log). On later re-runs the
# password step is skipped (the default admin/admin no longer applies).
#
# Variables live in inventory/group_vars/all.yml. The CT lifecycle is driven via
# `pct` over SSH to the Proxmox host (single credential), consistent with the
# Tailscale playbook; migration of LXC creation to Terraform is planned (ADR-008).

- name: Provision Technitium DNS LXC (DNS-only resolver)
  hosts: proxmox
  gather_facts: false

  vars_prompt:
    - name: tech_admin_password
      prompt: "Technitium admin console password (set on first install only)"
      private: true

  tasks:
    - name: Validate admin password is reasonable
      ansible.builtin.assert:
        that: tech_admin_password | length >= 12
        fail_msg: "Use at least 12 characters for the Technitium admin password."
        quiet: true

    - name: Check whether CT {{ technitium_ctid }} already exists
      ansible.builtin.command: "pct status {{ technitium_ctid }}"
      register: ct_status
      changed_when: false
      failed_when: false

    - name: Ensure Debian template is downloaded
      ansible.builtin.command: "pveam download {{ template_store }} {{ lxc_template }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ lxc_template }}"
      when: ct_status.rc != 0

    - name: Create unprivileged Technitium LXC
      ansible.builtin.command: >
        pct create {{ technitium_ctid }} {{ template_store }}:vztmpl/{{ lxc_template }}
        --hostname {{ technitium_hostname }}
        --cores {{ technitium_cores }}
        --memory {{ technitium_ram_mb }}
        --swap 0
        --rootfs {{ rootfs_storage }}:{{ technitium_disk_gb }}
        --net0 name=eth0,bridge={{ bridge }},ip={{ technitium_ip }},gw={{ gateway }}
        --unprivileged 1
        --features nesting=1
        --onboot 1
      when: ct_status.rc != 0

    - name: Ensure CT is running
      ansible.builtin.command: "pct start {{ technitium_ctid }}"
      register: ct_start
      changed_when: "'already running' not in (ct_start.stderr | default(''))"
      failed_when:
        - ct_start.rc != 0
        - "'already running' not in (ct_start.stderr | default(''))"

    - name: Wait for the CT to be responsive
      ansible.builtin.command: "pct exec {{ technitium_ctid }} -- true"
      register: ct_ready
      until: ct_ready.rc == 0
      retries: 15
      delay: 3
      changed_when: false

    # Deterministic fresh-install gate: is dns.service already enabled? This (not
    # parsing the installer's stdout) drives whether we install and whether the
    # default-credentials password change runs — so a re-run never re-touches it
    # and a first run never silently leaves admin/admin in place.
    - name: Check whether Technitium is already installed
      ansible.builtin.command: "pct exec {{ technitium_ctid }} -- systemctl is-enabled dns.service"
      register: dns_present
      changed_when: false
      failed_when: false

    - name: Install Technitium DNS Server inside the CT
      ansible.builtin.shell: |
        pct exec {{ technitium_ctid }} -- bash -c '
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq curl >/dev/null
          curl -sSL https://download.technitium.com/dns/install.sh | bash
        '
      register: tech_install
      changed_when: true
      when: dns_present.rc != 0

    - name: Wait for the Technitium web console to come up (port 5380)
      ansible.builtin.command: >
        pct exec {{ technitium_ctid }} --
        curl -fsS -o /dev/null "http://127.0.0.1:5380/api/user/login?user=admin&pass=admin"
      register: tech_web
      until: tech_web.rc == 0
      retries: 20
      delay: 3
      changed_when: false
      when: dns_present.rc != 0

    # First-install only (default credentials are admin/admin): get a token, then
    # set the operator password. Gated on the deterministic fresh-install check.
    - name: Get first-login API token (default admin/admin)
      ansible.builtin.command: >
        pct exec {{ technitium_ctid }} --
        curl -fsS "http://127.0.0.1:5380/api/user/login?user=admin&pass=admin"
      register: tech_login
      changed_when: false
      when: dns_present.rc != 0

    # changePassword needs BOTH the current password (pass=admin, the install
    # default) and the new one (newPass). Technitium returns HTTP 200 even on API
    # errors, so curl alone can't detect failure — we parse the JSON status and
    # fail loudly if it isn't "ok" (otherwise the console silently stays on
    # admin/admin, a LAN-reachable open admin console).
    - name: Set the admin console password via API
      ansible.builtin.command: >
        pct exec {{ technitium_ctid }} --
        curl -fsS "http://127.0.0.1:5380/api/user/changePassword?token={{ (tech_login.stdout | from_json).token }}&pass=admin&newPass={{ tech_admin_password | urlencode }}"
      register: tech_pwchange
      no_log: true
      changed_when: true
      failed_when: (tech_pwchange.stdout | from_json).status != "ok"
      when: dns_present.rc != 0

    - name: Confirm default credentials are now rejected
      ansible.builtin.command: >
        pct exec {{ technitium_ctid }} --
        curl -fsS "http://127.0.0.1:5380/api/user/login?user=admin&pass=admin"
      register: tech_defcheck
      changed_when: false
      failed_when: (tech_defcheck.stdout | from_json).status == "ok"
      when: dns_present.rc != 0

    - name: Get the CT's LAN IP for reporting
      ansible.builtin.command: "pct exec {{ technitium_ctid }} -- hostname -I"
      register: tech_ip
      changed_when: false

    - name: Report result and next steps
      ansible.builtin.debug:
        msg:
          - "Technitium DNS LXC {{ technitium_ctid }} is up at {{ tech_ip.stdout | trim }}."
          - "Web console: http://{{ technitium_ip | regex_replace('/.*$', '') }}:5380  (user: admin)"
          - "NEXT (Technitium console — see docs/operations/runbooks.md for the full cutover):"
          - "  1. Settings -> add upstream forwarders (DoH/DoT, e.g. Cloudflare/Quad9)."
          - "  2. Blocking -> add blocklists (e.g. OISD, StevenBlack hosts); enable blocking."
          - "  3. Test from the mgmt-vm: dig @{{ technitium_ip | regex_replace('/.*$', '') }} example.com"
          - "  4. ONLY THEN: in UniFi, hand this IP out as the network DNS server (cutover)."
          - "  5. Reserve/exclude {{ technitium_ip }} in UniFi so the IP never changes."
