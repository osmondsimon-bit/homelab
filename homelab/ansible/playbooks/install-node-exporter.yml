---
# Install Prometheus node_exporter on every Proxmox host so the monitoring stack can
# scrape host OS metrics (CPU/mem/disk/net) and maintenance intent on :9100.
# (ADR-013. node_exporter is a read-only metrics agent — the one sanctioned
# exception to "nothing on the host"; it's what host monitoring requires.)
#
# Run from the mgmt-vm, inside homelab/ansible/ — targets all Proxmox hosts:
#   ansible-playbook playbooks/install-node-exporter.yml
# Idempotent.

- name: Install node_exporter on Proxmox hosts
  hosts: proxmox
  gather_facts: false

  tasks:
    - name: Install node_exporter and host maintenance metrics
      ansible.builtin.include_tasks: tasks/install-maintenance-collector.yml
      vars:
        maintenance_target_name: "{{ inventory_hostname }}"
        maintenance_target_kind: pve-host
