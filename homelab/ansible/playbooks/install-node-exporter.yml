---
# Install Prometheus node_exporter on every Proxmox host so the monitoring stack can
# scrape host OS metrics (CPU/mem/disk/net) and maintenance intent on :9100.
# (ADR-013. node_exporter is a read-only metrics agent — the one sanctioned
# exception to "nothing on the host"; it's what host monitoring requires.)
#
# Run from the mgmt-vm, inside homelab/ansible/ — targets all Proxmox hosts:
#   ansible-playbook playbooks/install-node-exporter.yml
# Idempotent.

- name: Install node_exporter on Proxmox hosts
  hosts: proxmox
  gather_facts: false

  tasks:
    - name: Install node_exporter and host maintenance metrics
      ansible.builtin.include_tasks: tasks/install-maintenance-collector.yml
      vars:
        maintenance_target_name: "{{ inventory_hostname }}"
        maintenance_target_kind: pve-host

    # Debian's node_exporter deliberately excludes /mnt from the filesystem collector. Monitor the
    # generated mount unit instead: this checks systemd state without calling statfs on the USB disk.
    - name: Configure safe Media USB mount-state monitoring on apophis
      ansible.builtin.copy:
        dest: /etc/default/prometheus-node-exporter
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible. Keep the default filesystem exclusions, including /mnt.
          # The include keeps collection to one unit. Clear node_exporter's default exclusion of
          # all .mount units, which otherwise also wins over an explicit include.
          ARGS="--collector.systemd --collector.systemd.unit-include=^mnt-usb.*media[.]mount$ --collector.systemd.unit-exclude=^$"
      when: inventory_hostname == "apophis"
      notify: Restart node_exporter

  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: restarted
