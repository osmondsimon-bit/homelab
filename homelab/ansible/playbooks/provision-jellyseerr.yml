---
# Provision the media-automation VM (VMID 125) on apophis — Phase 7, ADR-022.
# A DEDICATED Ubuntu 24.04 Docker VM (ADR-014 Docker exception, like Vaultwarden VM 118) running:
#   - jellyseerr : request UI (LAN-direct; auths via Jellyfin)
#   - gluetun    : ProtonVPN WireGuard egress for the indexer side
#   - prowlarr   : indexer manager, behind Gluetun (network_mode: service:gluetun) so it bypasses
#                  the ISP block AND shares one VPN exit IP. WebUI published on the VM IP :9696.
# (ByParr/FlareSolverr dropped — add behind the same Gluetun only if an indexer needs CF-solving.)
#
# Run from the mgmt-vm:  cd homelab/ansible && ansible-playbook playbooks/provision-jellyseerr.yml
#   (NO --limit — play 1 is scoped to apophis; play 2 targets the VM.)
# Needs jellyseerr_ip + prowlarr_vpn_wg_config set in the gitignored all.yml.

- name: Create the Jellyseerr VM on apophis (Ubuntu cloud image + cloud-init)
  hosts: apophis
  gather_facts: false
  vars:
    js_cloud_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    js_cloud_image: "noble-server-cloudimg-amd64.img"
    js_ip_bare: "{{ jellyseerr_ip | regex_replace('/.*$', '') }}"
  tasks:
    - name: Assert the IP + VPN config are set (not placeholders)
      ansible.builtin.assert:
        that:
          - "'YOUR_' not in jellyseerr_ip"
          - "(prowlarr_vpn_wg_config | trim | length) > 0"
        fail_msg: "Set jellyseerr_ip (reserved in UniFi) + prowlarr_vpn_wg_config (2nd ProtonVPN WireGuard config) in the gitignored all.yml first."

    - name: Check whether VM {{ jellyseerr_vmid }} already exists
      ansible.builtin.command: "qm status {{ jellyseerr_vmid }}"
      register: vm_status
      changed_when: false
      failed_when: false

    - name: Download the Ubuntu cloud image
      ansible.builtin.get_url:
        url: "{{ js_cloud_image_url }}"
        dest: "/var/lib/vz/template/{{ js_cloud_image }}"
        mode: "0644"
      when: vm_status.rc != 0

    - name: Stage the mgmt-vm public key for cloud-init
      ansible.builtin.copy:
        dest: "/tmp/js-cloudinit.pub"
        content: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}\n"
        mode: "0644"
      when: vm_status.rc != 0

    - name: Create the VM (cloud image disk + cloud-init)
      ansible.builtin.shell: |
        set -e
        qm create {{ jellyseerr_vmid }} --name {{ jellyseerr_hostname }} \
          --memory {{ jellyseerr_ram_mb }} --cores {{ jellyseerr_cores }} --cpu {{ jellyseerr_cpu }} \
          --net0 virtio,bridge={{ bridge }} --scsihw virtio-scsi-pci --machine q35 --ostype l26 \
          --agent enabled=1 --onboot 1 --startup order=8,up=10
        qm set {{ jellyseerr_vmid }} --scsi0 {{ rootfs_storage }}:0,import-from=/var/lib/vz/template/{{ js_cloud_image }}
        qm set {{ jellyseerr_vmid }} --ide2 {{ rootfs_storage }}:cloudinit --boot order=scsi0
        qm disk resize {{ jellyseerr_vmid }} scsi0 {{ jellyseerr_disk_gb }}G
        qm set {{ jellyseerr_vmid }} --ciuser {{ jellyseerr_ci_user | default('simon') }} \
          --sshkeys /tmp/js-cloudinit.pub \
          --ipconfig0 ip={{ jellyseerr_ip }},gw={{ gateway }} --nameserver {{ gateway }}
        rm -f /tmp/js-cloudinit.pub
        qm start {{ jellyseerr_vmid }}
      when: vm_status.rc != 0

    - name: Wait for the VM's SSH (cloud-init first boot)
      ansible.builtin.wait_for:
        host: "{{ js_ip_bare }}"
        port: 22
        timeout: 180
      delegate_to: localhost

    - name: Hand the VM to play 2
      ansible.builtin.add_host:
        name: "jellyseerr-vm"
        ansible_host: "{{ js_ip_bare }}"
        ansible_user: "{{ jellyseerr_ci_user | default('simon') }}"
        ansible_python_interpreter: /usr/bin/python3
        groups: _js_target
      changed_when: false

- name: Configure Jellyseerr on the VM (Docker + container)
  hosts: _js_target
  gather_facts: false
  become: true
  tasks:
    - name: Base packages (guest agent, prereqs)
      ansible.builtin.apt:
        name: [qemu-guest-agent, ca-certificates, curl]
        update_cache: true
      register: base_pkgs
      retries: 3
      delay: 5
      until: base_pkgs is succeeded

    - name: Docker apt repo (official)
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      args: { creates: /etc/apt/sources.list.d/docker.list }

    - name: Install Docker engine + compose plugin
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true

    - name: Parse the Prowlarr VPN WireGuard config for Gluetun
      ansible.builtin.set_fact:
        vpn_priv_key: "{{ prowlarr_vpn_wg_config | regex_search('PrivateKey\\s*=\\s*(\\S+)', '\\1') | first }}"
        vpn_address: "{{ prowlarr_vpn_wg_config | regex_search('Address\\s*=\\s*([0-9./]+)', '\\1') | first }}"
        vpn_pub_key: "{{ prowlarr_vpn_wg_config | regex_search('PublicKey\\s*=\\s*(\\S+)', '\\1') | first }}"
        vpn_endpoint_ip: "{{ prowlarr_vpn_wg_config | regex_search('Endpoint\\s*=\\s*([0-9.]+):[0-9]+', '\\1') | first }}"
        vpn_endpoint_port: "{{ prowlarr_vpn_wg_config | regex_search('Endpoint\\s*=\\s*[0-9.]+:([0-9]+)', '\\1') | first }}"
      no_log: true

    - name: Project dirs (jellyseerr + prowlarr config)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
      loop:
        - /opt/jellyseerr/config
        - /opt/jellyseerr/prowlarr

    - name: Compose file (jellyseerr LAN-direct; prowlarr behind gluetun's VPN)
      ansible.builtin.copy:
        dest: /opt/jellyseerr/docker-compose.yml
        mode: "0600"
        content: |
          services:
            jellyseerr:
              image: {{ jellyseerr_image }}
              container_name: jellyseerr
              restart: unless-stopped
              environment:
                - TZ={{ patching_timezone | default('Etc/UTC') }}
              volumes:
                - ./config:/app/config
              ports:
                - "{{ jellyseerr_port }}:5055"
              security_opt:
                - no-new-privileges:true

            gluetun:
              image: {{ gluetun_image }}
              container_name: gluetun
              restart: unless-stopped
              cap_add:
                - NET_ADMIN
              devices:
                - /dev/net/tun:/dev/net/tun
              environment:
                - VPN_SERVICE_PROVIDER=custom
                - VPN_TYPE=wireguard
                - WIREGUARD_PRIVATE_KEY={{ vpn_priv_key }}
                - WIREGUARD_ADDRESSES={{ vpn_address }}
                - WIREGUARD_PUBLIC_KEY={{ vpn_pub_key }}
                - VPN_ENDPOINT_IP={{ vpn_endpoint_ip }}
                - VPN_ENDPOINT_PORT={{ vpn_endpoint_port }}
                - FIREWALL_OUTBOUND_SUBNETS={{ lan_cidr }}
                - TZ={{ patching_timezone | default('Etc/UTC') }}
              ports:
                - "{{ prowlarr_port }}:9696"
              security_opt:
                - no-new-privileges:true

            prowlarr:
              image: {{ prowlarr_docker_image }}
              container_name: prowlarr
              restart: unless-stopped
              network_mode: "service:gluetun"
              depends_on:
                - gluetun
              environment:
                - PUID=1000
                - PGID=1000
                - TZ={{ patching_timezone | default('Etc/UTC') }}
              volumes:
                - ./prowlarr:/config
              security_opt:
                - no-new-privileges:true
      no_log: true
      register: js_compose

    - name: Deploy / update the containers (remove the old solver container if the image changed)
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans {{ '--force-recreate' if js_compose.changed else '' }}
        chdir: /opt/jellyseerr
      changed_when: true

    - name: Verify Jellyseerr + Prowlarr-via-VPN; confirm the indexer egress is the VPN exit
      ansible.builtin.shell: |
        for i in $(seq 1 20); do c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:{{ jellyseerr_port }}/api/v1/status); [ "$c" = "200" ] && break; sleep 3; done; echo "jellyseerr:$c"
        for i in $(seq 1 40); do c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:{{ prowlarr_port }}/ping); [ "$c" = "200" ] && break; sleep 3; done; echo "prowlarr:$c"
        echo -n "prowlarr_egress_ip:"; docker exec gluetun wget -qO- --timeout=10 https://api.ipify.org 2>/dev/null || echo "(gluetun not ready)"
        echo
      register: js_http
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg:
          - "VM {{ jellyseerr_vmid }} ({{ hostvars['jellyseerr-vm'].ansible_host }}) — {{ js_http.stdout_lines }}"
          - "CHECK: prowlarr_egress_ip MUST be the ProtonVPN exit, NOT your home WAN — that's the whole point."
          - "Jellyseerr UI: http://{{ hostvars['jellyseerr-vm'].ansible_host }}:{{ jellyseerr_port }} -> sign in with Jellyfin -> add Sonarr + Radarr."
          - "Prowlarr UI: http://{{ hostvars['jellyseerr-vm'].ansible_host }}:{{ prowlarr_port }} (behind the VPN) -> add indexers + link Sonarr/Radarr."
          - "Onboarding (ADR-017): Glance/GuestDown cover VM {{ jellyseerr_vmid }}; not imaged (configs small + reproducible)."
