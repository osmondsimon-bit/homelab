---
# Provision Prowlarr (CT 122) on apophis — Phase 7, ADR-022.
# Indexer manager for the *arr stack: configure torrent indexers once, it syncs them to
# Sonarr/Radarr. Native install (Servarr self-contained build + systemd — no Docker).
# Unprivileged Debian LXC, LAN/Tailscale only, no media mount. This is the template the
# Sonarr/Radarr playbooks follow (same Servarr pattern, different binary/port + media mount).
#
# Run: cd homelab/ansible && ansible-playbook playbooks/provision-prowlarr.yml --limit apophis
# Needs prowlarr_ip set (reserved in UniFi) in the gitignored all.yml.

- name: Provision Prowlarr indexer-manager LXC
  hosts: apophis
  gather_facts: false

  tasks:
    - name: Assert the IP is set (not a placeholder)
      ansible.builtin.assert:
        that: "'YOUR_' not in prowlarr_ip"
        fail_msg: "Set prowlarr_ip (reserved in UniFi) in the gitignored all.yml first."

    - name: Check whether CT {{ prowlarr_ctid }} already exists
      ansible.builtin.command: "pct status {{ prowlarr_ctid }}"
      register: ct_status
      changed_when: false
      failed_when: false

    - name: Ensure Debian template is downloaded
      ansible.builtin.command: "pveam download {{ template_store }} {{ lxc_template }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ lxc_template }}"
      when: ct_status.rc != 0

    - name: Create unprivileged Prowlarr LXC
      ansible.builtin.command: >
        pct create {{ prowlarr_ctid }} {{ template_store }}:vztmpl/{{ lxc_template }}
        --hostname {{ prowlarr_hostname }}
        --cores {{ prowlarr_cores }}
        --memory {{ prowlarr_ram_mb }}
        --swap 0
        --rootfs {{ rootfs_storage }}:{{ prowlarr_disk_gb }}
        --net0 name=eth0,bridge={{ bridge }},ip={{ prowlarr_ip }},gw={{ gateway }}
        --unprivileged 1
        --features nesting=1
        --onboot 1
        --startup order=7,up=10
      register: ct_create
      when: ct_status.rc != 0
      changed_when: ct_create.rc == 0

    - name: Ensure CT is running
      ansible.builtin.command: "pct start {{ prowlarr_ctid }}"
      register: ct_start
      changed_when: "'already running' not in (ct_start.stderr | default(''))"
      failed_when:
        - ct_start.rc != 0
        - "'already running' not in (ct_start.stderr | default(''))"

    - name: Wait for the CT to be responsive
      ansible.builtin.command: "pct exec {{ prowlarr_ctid }} -- true"
      register: ct_ready
      until: ct_ready.rc == 0
      retries: 15
      delay: 3
      changed_when: false

    - name: Install runtime deps (libicu + sqlite3 + curl)
      ansible.builtin.shell: |
        pct exec {{ prowlarr_ctid }} -- bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq curl ca-certificates sqlite3 libicu72 >/dev/null
        '
      changed_when: true

    - name: Check whether Prowlarr is already installed
      ansible.builtin.command: "pct exec {{ prowlarr_ctid }} -- test -x /opt/Prowlarr/Prowlarr"
      register: prowlarr_installed
      changed_when: false
      failed_when: false

    - name: Download + install Prowlarr (Servarr self-contained build) + service user
      ansible.builtin.shell: |
        pct exec {{ prowlarr_ctid }} -- bash -c '
          set -e
          cd /tmp
          curl -fsSL "https://prowlarr.servarr.com/v1/update/master/updatefile?os=linux&runtime=netcore&arch=x64" -o prowlarr.tar.gz
          tar -xzf prowlarr.tar.gz -C /opt
          rm -f prowlarr.tar.gz
          id prowlarr >/dev/null 2>&1 || useradd --system --no-create-home --shell /usr/sbin/nologin prowlarr
          mkdir -p /var/lib/prowlarr
          chown -R prowlarr:prowlarr /var/lib/prowlarr /opt/Prowlarr
        '
      when: prowlarr_installed.rc != 0
      changed_when: true

    - name: Install the Prowlarr systemd unit
      ansible.builtin.shell: >
        echo '{{ prowlarr_unit | b64encode }}' | base64 -d |
        pct exec {{ prowlarr_ctid }} -- bash -c 'cat > /etc/systemd/system/prowlarr.service'
      vars:
        prowlarr_unit: |
          [Unit]
          Description=Prowlarr
          After=network-online.target
          Wants=network-online.target
          [Service]
          User=prowlarr
          Group=prowlarr
          UMask=0002
          ExecStart=/opt/Prowlarr/Prowlarr -nobrowser -data=/var/lib/prowlarr
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
      changed_when: true

    - name: Enable + (re)start Prowlarr
      ansible.builtin.shell: |
        pct exec {{ prowlarr_ctid }} -- bash -c '
          systemctl daemon-reload
          systemctl enable --now prowlarr >/dev/null 2>&1
          systemctl restart prowlarr
        '
      changed_when: true

    - name: Confirm Prowlarr is serving
      ansible.builtin.command: >
        pct exec {{ prowlarr_ctid }} -- bash -c
        'for i in $(seq 1 20); do curl -fsS -o /dev/null -w "%{http_code}" http://localhost:{{ prowlarr_port }}/ping && break || sleep 2; done'
      register: prowlarr_http
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg:
          - "Prowlarr CT {{ prowlarr_ctid }} up at {{ prowlarr_ip | regex_replace('/.*$','') }}:{{ prowlarr_port }} (ping {{ prowlarr_http.stdout }})."
          - "NEXT: open the Web-UI -> Settings -> set an auth password; add indexers; it syncs them to Sonarr/Radarr once those exist."
          - "Onboarding TODO (ADR-017): glance tile + GuestDown lxc/{{ prowlarr_ctid }}; not backed up by design (config is small + reproducible)."
