---
# Provision the Monitoring stack on oneill: Prometheus (scrape + TSDB) + Grafana +
# pve-exporter + Alertmanager (-> am-ntfy bridge -> ntfy) + alert rules, native
# packages, unprivileged LXC (needs nesting=1 for the services' systemd sandboxing),
# TSDB on a quota'd ZFS bind-mount (ADR-013). node_exporter on the hosts is
# install-node-exporter.yml (run that first). Idempotent.
#
# Run from the mgmt-vm, inside homelab/ansible/ — NO --limit (the first play records
# the control-node address, the token play hits every PVE node, and the final play
# builds/configures CT 114):
#   ansible-playbook playbooks/provision-monitoring.yml
#
# Grafana admin password is prompted; leave blank on re-runs to keep the current one.
# Vars: monitoring_* in group_vars. Grafana :3000 / Prometheus :9090 — LAN/Tailscale only.

- name: Discover the mgmt-vm address for maintenance metrics
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Require a routable IPv4 address on the control node
      ansible.builtin.assert:
        that:
          - ansible_default_ipv4.address is defined
          - ansible_default_ipv4.address | length > 0
        fail_msg: "Could not discover mgmt-vm's default IPv4 address for the Prometheus node target."
        quiet: true

- name: Mint read-only PVEAuditor tokens for pve-exporter
  hosts: proxmox
  gather_facts: false
  tasks:
    # Mint once per cluster/standalone node. Hosts with `token_from` (clustered members
    # that share another node's cluster-wide token) skip minting — re-minting the same
    # shared token from two nodes races and breaks the ACL.
    - name: (Re)create the monitoring API token and grant PVEAuditor
      ansible.builtin.shell: |
        pveum user token remove root@pam monitoring >/dev/null 2>&1 || true
        pveum user token add root@pam monitoring --privsep 1 --output-format json
        pveum acl modify / --roles PVEAuditor --tokens 'root@pam!monitoring' >/dev/null 2>&1
      register: pve_tok
      changed_when: true
      when: (monitoring_pve_nodes | selectattr('name', 'equalto', inventory_hostname) | first).token_from is not defined

    - name: Stash the token value (read-only, used only in pve.yml)
      ansible.builtin.set_fact:
        pve_token_value: "{{ (pve_tok.stdout | from_json).value }}"
      no_log: true
      when: (monitoring_pve_nodes | selectattr('name', 'equalto', inventory_hostname) | first).token_from is not defined

- name: Provision Monitoring LXC (Prometheus + Grafana + pve-exporter)
  hosts: oneill
  gather_facts: false

  vars_prompt:
    - name: grafana_admin_password
      prompt: "Grafana admin password (blank = keep current)"
      private: true
      default: ""
    - name: unifi_password
      prompt: "UniFi prometheus_user password (blank = keep current)"
      private: true
      default: ""
    - name: ha_token
      prompt: "Home Assistant long-lived token (blank = keep current)"
      private: true
      default: ""

  tasks:
    - name: Sanity-check both PVE tokens were minted (run without --limit)
      ansible.builtin.assert:
        that: hostvars[item.token_from | default(item.name)].pve_token_value is defined
        fail_msg: "No token for {{ item.name }} (source {{ item.token_from | default(item.name) }}) — run without --limit so play 1 hits every minting host."
        quiet: true
      loop: "{{ monitoring_pve_nodes }}"

    - name: Validate admin password length (when setting one)
      ansible.builtin.assert:
        that: grafana_admin_password | length >= 12
        fail_msg: "Use at least 12 characters (or leave blank to keep current)."
        quiet: true
      when: grafana_admin_password | length > 0

    # --- TSDB dataset (quota'd) ---
    - name: Create the TSDB ZFS dataset with a quota
      ansible.builtin.command: >
        zfs create -o quota={{ monitoring_tsdb_quota }} -o compression=lz4 {{ monitoring_tsdb_dataset }}
      register: zfs_create
      changed_when: zfs_create.rc == 0
      failed_when:
        - zfs_create.rc != 0
        - "'dataset already exists' not in (zfs_create.stderr | default(''))"

    - name: Ensure the quota is set (idempotent)
      ansible.builtin.command: "zfs set quota={{ monitoring_tsdb_quota }} {{ monitoring_tsdb_dataset }}"
      changed_when: false

    - name: Own the TSDB dataset for the container's mapped root
      ansible.builtin.command: "chown 100000:100000 /{{ monitoring_tsdb_dataset }}"
      changed_when: false

    # --- The LXC ---
    - name: Check whether CT {{ monitoring_ctid }} already exists
      ansible.builtin.command: "pct status {{ monitoring_ctid }}"
      register: ct_status
      changed_when: false
      failed_when: false

    - name: Ensure Debian template is downloaded
      ansible.builtin.command: "pveam download {{ template_store }} {{ lxc_template }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ lxc_template }}"
      when: ct_status.rc != 0

    - name: Create unprivileged Monitoring LXC with the TSDB dataset bind-mounted
      ansible.builtin.command: >
        pct create {{ monitoring_ctid }} {{ template_store }}:vztmpl/{{ lxc_template }}
        --hostname {{ monitoring_hostname }}
        --cores {{ monitoring_cores }}
        --memory {{ monitoring_ram_mb }}
        --swap 0
        --rootfs {{ rootfs_storage }}:{{ monitoring_disk_gb }}
        --net0 name=eth0,bridge={{ bridge }},ip={{ monitoring_ip }},gw={{ gateway }}
        --mp0 /{{ monitoring_tsdb_dataset }},mp={{ monitoring_tsdb_mount }}
        --unprivileged 1
        --features nesting=1
        --onboot 1
        --startup order=3,up=10
      when: ct_status.rc != 0

    - name: Ensure CT is running
      ansible.builtin.command: "pct start {{ monitoring_ctid }}"
      register: ct_start
      changed_when: "'already running' not in (ct_start.stderr | default(''))"
      failed_when:
        - ct_start.rc != 0
        - "'already running' not in (ct_start.stderr | default(''))"

    - name: Wait for the CT to be responsive
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- true"
      register: ct_ready
      until: ct_ready.rc == 0
      retries: 15
      delay: 3
      changed_when: false

    # --- Prometheus (Debian) + Grafana (official repo) + pve-exporter (venv) ---
    - name: Check whether Grafana is already installed
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- dpkg -s grafana"
      register: graf_present
      changed_when: false
      failed_when: false

    - name: Install Prometheus + Grafana inside the CT
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq prometheus python3-venv gpg curl >/dev/null
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor > /etc/apt/keyrings/grafana.gpg
          echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" \
            > /etc/apt/sources.list.d/grafana.list
          apt-get update -qq
          apt-get install -y -qq grafana >/dev/null
        '
      when: graf_present.rc != 0
      changed_when: true

    - name: Ensure the TSDB mount is owned by the prometheus user
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- chown -R prometheus:prometheus {{ monitoring_tsdb_mount }}"
      changed_when: false

    - name: Install prometheus-pve-exporter into a venv
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- /opt/pve-exporter/bin/pve_exporter --help"
      register: pve_installed
      changed_when: false
      failed_when: false

    - name: Create the pve-exporter venv (if missing)
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          python3 -m venv /opt/pve-exporter
          /opt/pve-exporter/bin/pip install -q prometheus-pve-exporter
        '
      when: pve_installed.rc != 0
      changed_when: true

    - name: Write pve-exporter config (one module per node, read-only tokens)
      ansible.builtin.shell: >
        echo '{{ pve_yml | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} --
        bash -c 'mkdir -p /etc/pve-exporter && cat > /etc/pve-exporter/pve.yml && chmod 600 /etc/pve-exporter/pve.yml'
      vars:
        pve_yml: |
          {% for n in monitoring_pve_nodes %}
          {{ n.name }}:
            user: root@pam
            token_name: monitoring
            token_value: {{ hostvars[n.token_from | default(n.name)].pve_token_value }}
            verify_ssl: false
          {% endfor %}
      no_log: true
      changed_when: true

    - name: Install the pve-exporter systemd unit
      ansible.builtin.shell: >
        echo '{{ pve_unit | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/systemd/system/pve-exporter.service'
      vars:
        pve_unit: |
          [Unit]
          Description=Prometheus PVE Exporter
          After=network-online.target
          [Service]
          ExecStart=/opt/pve-exporter/bin/pve_exporter --config.file /etc/pve-exporter/pve.yml
          Restart=on-failure
          User=root
          [Install]
          WantedBy=multi-user.target
      changed_when: true

    # --- UniFi (unpoller) ---
    - name: Check whether unpoller is installed
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- dpkg -s unpoller"
      register: unpoller_present
      changed_when: false
      failed_when: false

    - name: Install unpoller (latest release .deb)
      ansible.builtin.shell: >
        echo '{{ unpoller_install | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -s
      vars:
        unpoller_install: |
          set -e
          url=$(curl -fsSL https://api.github.com/repos/unpoller/unpoller/releases/latest | python3 -c 'import sys,json;print([a["browser_download_url"] for a in json.load(sys.stdin)["assets"] if a["name"].endswith("Tux_64-bit.deb")][0])')
          curl -fsSL "$url" -o /tmp/unpoller.deb
          apt-get install -y -qq /tmp/unpoller.deb >/dev/null
          rm -f /tmp/unpoller.deb
      when: unpoller_present.rc != 0
      changed_when: true

    - name: Write unpoller config (when a UniFi password is given)
      ansible.builtin.shell: >
        echo '{{ up_conf | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'mkdir -p /etc/unpoller && cat > /etc/unpoller/up.conf && chmod 600 /etc/unpoller/up.conf'
      vars:
        up_conf: |
          [poller]
            quiet = true
          [prometheus]
            disable = false
            http_listen = "0.0.0.0:9130"
          [influxdb]
            disable = true
          [[unifi.controller]]
            url = "{{ unifi_controller_url }}"
            user = "{{ unifi_user }}"
            pass = "{{ unifi_password }}"
            sites = ["all"]
            verify_ssl = false
      no_log: true
      changed_when: true
      when: unifi_password | length > 0

    # --- Blackbox exporter (TCP-connect probes for non-scrapeable devices, ADR-013) ---
    # Black-box reachability for things Prometheus can't scrape. Primary use: a TCP probe
    # of the SLZB-06 Zigbee coordinator's Z2MQTT port (zigbee_coordinator_target) so a
    # coordinator drop — the root cause of Zigbee outages — is caught independent of HA.
    - name: Check whether blackbox-exporter is installed
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- dpkg -s prometheus-blackbox-exporter"
      register: blackbox_present
      changed_when: false
      failed_when: false

    - name: Install blackbox-exporter inside the CT
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y -qq prometheus-blackbox-exporter >/dev/null
        '
      when: blackbox_present.rc != 0
      changed_when: true

    - name: Write blackbox-exporter config (tcp_connect module)
      ansible.builtin.shell: >
        echo '{{ blackbox_yml | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/prometheus/blackbox.yml'
      vars:
        blackbox_yml: |
          modules:
            tcp_connect:
              prober: tcp
              timeout: 5s
              tcp:
                preferred_ip_protocol: ip4
      changed_when: true

    # --- Home Assistant token (Prometheus reads it via credentials_file) ---
    - name: Write the HA token file (when a token is given)
      ansible.builtin.shell: >
        echo '{{ ha_token | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/prometheus/ha_token && chmod 600 /etc/prometheus/ha_token && chown prometheus:prometheus /etc/prometheus/ha_token'
      no_log: true
      changed_when: true
      when: ha_token | length > 0

    # --- Prometheus config (self + node + pve + unifi + home-assistant) ---
    - name: Write prometheus.yml
      ansible.builtin.shell: >
        echo '{{ prom_yml | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/prometheus/prometheus.yml'
      vars:
        prom_yml: |
          global:
            scrape_interval: {{ monitoring_scrape_interval }}
          alerting:
            alertmanagers:
              - static_configs:
                  - targets: ["localhost:{{ monitoring_alertmanager_port }}"]
          rule_files:
            - /etc/prometheus/rules/*.yml
          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ["localhost:9090"]
            - job_name: alertmanager
              static_configs:
                - targets: ["localhost:{{ monitoring_alertmanager_port }}"]
            - job_name: node
              static_configs:
                - targets: {{ (monitoring_node_targets + [hostvars['localhost'].ansible_default_ipv4.address ~ ':9100', (vaultwarden_ip | regex_replace('/.*$', '')) ~ ':9100', (jellyseerr_ip | regex_replace('/.*$', '')) ~ ':9100'] + ([(actual_ip | regex_replace('/.*$', '')) ~ ':9100'] if (actual_enabled | default(false) | bool) else [])) | unique | list | to_json }}
          {% for n in monitoring_pve_nodes %}
            - job_name: pve-{{ n.name }}
              metrics_path: /pve
              params: { module: ["{{ n.name }}"] }
              static_configs:
                - targets: ["{{ n.host }}"]
              relabel_configs:
                - { source_labels: [__address__], target_label: __param_target }
                - { source_labels: [__param_target], target_label: instance }
                - { target_label: __address__, replacement: "localhost:9221" }
          {% endfor %}
          {% if unifi_controller_url is defined %}
            - job_name: unifi
              static_configs:
                - targets: ["localhost:9130"]
          {% endif %}
          {% if ha_ip is defined %}
            - job_name: home-assistant
              scheme: http
              metrics_path: /api/prometheus
              authorization:
                credentials_file: /etc/prometheus/ha_token
              static_configs:
                - targets: ["{{ ha_ip }}:8123"]
              # Measurements-only keep-list (ADR-016). HA's metrics TSDB stores ONLY
              # numeric physical quantities + climate temps; state/event metrics
              # (hass_state_change_*, hass_entity_available, switches/lights/binary/
              # presence/automations) stay in HA's recorder + Long-Term Statistics.
              # This bounds cardinality as the home grows (50 dimmers = light/switch
              # entities, never matched here). Add new measurement metric names below
              # when a new device_class appears. (up/scrape_* bypass relabeling.)
              metric_relabel_configs:
                # Prefix-agnostic (HA default `homeassistant_` OR custom `namespace: hass_`):
                # KEEP the numeric measurement metrics (any entity; note the `;.*` suffix once
                # `entity` is concatenated) OR the ONE pinned Zigbee bridge connectivity sensor.
                # binary_sensor_state is otherwise excluded by ADR-016; this single, named series
                # is the signal for Zigbee2MQTTBridgeDown and adds negligible cardinality.
                # (up/scrape_* are synthetic and bypass relabeling.)
                - source_labels: [__name__, entity]
                  separator: ';'
                  regex: '(hass|homeassistant)_(sensor_(temperature_celsius|humidity_percent|battery_percent|power_w|energy_kwh|current_a|voltage_v|voltage_mv|illuminance_lx|signal_strength_dbm|precipitation_mm|pressure_hpa|carbon_dioxide_ppm|pm25_ugm3)|climate_(current|target)_temperature_celsius);.*|(hass|homeassistant)_binary_sensor_state;binary_sensor\.zigbee2mqtt_bridge_connection_state'
                  action: keep
          {% endif %}
          {% if zigbee_coordinator_target is defined %}
            - job_name: blackbox-zigbee-coordinator
              metrics_path: /probe
              params: { module: ["tcp_connect"] }
              static_configs:
                - targets: ["{{ zigbee_coordinator_target }}"]
              # Probe the target THROUGH the blackbox exporter on :9115; instance = the device.
              relabel_configs:
                - { source_labels: [__address__], target_label: __param_target }
                - { source_labels: [__param_target], target_label: instance }
                - { target_label: __address__, replacement: "localhost:9115" }
          {% endif %}
      changed_when: true

    - name: Set Prometheus TSDB retention
      ansible.builtin.shell: >
        pct exec {{ monitoring_ctid }} -- bash -c
        'echo "ARGS=\"--storage.tsdb.retention.time={{ monitoring_retention_days }}d\"" > /etc/default/prometheus'
      changed_when: true

    # uid is pinned so vendored dashboards can reference it deterministically.
    # NOTE: fresh CTs create it with this uid cleanly. If you ever CHANGE the uid
    # on an existing CT, Grafana errors ("data source not found") because it can't
    # rewrite an existing datasource's uid — clear the stale row first:
    #   pct exec <ctid> -- sqlite3 /var/lib/grafana/grafana.db "DELETE FROM data_source WHERE name='Prometheus';"
    - name: Provision the Grafana Prometheus datasource
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c 'mkdir -p /etc/grafana/provisioning/datasources && cat > /etc/grafana/provisioning/datasources/prometheus.yml <<EOF
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            access: proxy
            url: http://localhost:9090
            isDefault: true
        EOF'
      changed_when: true

    # --- Grafana dashboards as code (ADR-013) -------------------------------
    # Vendored JSON in files/monitoring/dashboards/<Folder>/*.json, datasource
    # pinned to uid "prometheus". foldersFromFilesStructure maps each subdir to a
    # Grafana folder. allowUiUpdates lets you tweak live — but live edits must be
    # exported back to the repo (Dashboard > Export > Save to file) or they're
    # lost on the next playbook run.
    - name: Provision the Grafana dashboard provider
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/grafana/provisioning/dashboards/homelab.yml <<EOF
        apiVersion: 1
        providers:
          - name: homelab
            orgId: 1
            type: file
            disableDeletion: false
            allowUiUpdates: true
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: true
        EOF'
      changed_when: true

    - name: Stage dashboard JSON onto the Proxmox host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/monitoring/dashboards/"
        dest: "/tmp/grafana-dashboards/"
        mode: "0644"

    - name: Find staged dashboard files
      ansible.builtin.find:
        paths: /tmp/grafana-dashboards
        patterns: "*.json"
        recurse: true
      register: dash_files

    - name: Ensure dashboard folders exist in the CT
      ansible.builtin.command: >
        pct exec {{ monitoring_ctid }} --
        mkdir -p /var/lib/grafana/dashboards/Infrastructure /var/lib/grafana/dashboards/UniFi
      changed_when: false

    - name: Push dashboards into the CT (preserving folder structure)
      ansible.builtin.command: >
        pct push {{ monitoring_ctid }} {{ item.path }}
        /var/lib/grafana/dashboards/{{ item.path | regex_replace('^/tmp/grafana-dashboards/', '') }}
      loop: "{{ dash_files.files }}"
      loop_control:
        label: "{{ item.path | regex_replace('^/tmp/grafana-dashboards/', '') }}"
      changed_when: true

    - name: Own the dashboards dir for Grafana
      ansible.builtin.command: >
        pct exec {{ monitoring_ctid }} --
        chown -R grafana:grafana /var/lib/grafana/dashboards
      changed_when: false

    - name: Remove the staging dir from the Proxmox host
      ansible.builtin.file:
        path: /tmp/grafana-dashboards
        state: absent

    # --- Alertmanager + am-ntfy bridge + alert rules (ADR-013) ---------------
    - name: Check whether Alertmanager is installed
      ansible.builtin.command: "pct exec {{ monitoring_ctid }} -- dpkg -s prometheus-alertmanager"
      register: am_present
      changed_when: false
      failed_when: false

    - name: Install Alertmanager inside the CT
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y -qq prometheus-alertmanager >/dev/null
        '
      when: am_present.rc != 0
      changed_when: true

    - name: Disable Alertmanager's cluster listener (single instance; don't expose :9094)
      ansible.builtin.shell: >
        pct exec {{ monitoring_ctid }} -- bash -c
        'echo "ARGS=\"--cluster.listen-address=\"" > /etc/default/prometheus-alertmanager'
      changed_when: true

    - name: Write Alertmanager config (routes everything to the ntfy bridge)
      ansible.builtin.shell: >
        echo '{{ am_yml | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/prometheus/alertmanager.yml'
      vars:
        am_yml: |
          route:
            receiver: ntfy
            group_by: ['alertname', 'instance']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
          receivers:
            - name: ntfy
              webhook_configs:
                - url: http://127.0.0.1:{{ monitoring_amntfy_port }}/alert
                  send_resolved: true
      changed_when: true

    - name: Install the am-ntfy bridge script
      ansible.builtin.shell: >
        echo '{{ lookup('file', playbook_dir + '/../files/monitoring/am-ntfy.py') | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /usr/local/bin/am-ntfy.py && chmod 0755 /usr/local/bin/am-ntfy.py'
      changed_when: true

    - name: Write the am-ntfy environment file (private ntfy topic — 0600, root)
      ansible.builtin.shell: >
        echo '{{ amntfy_env | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'mkdir -p /etc/am-ntfy && cat > /etc/am-ntfy/env && chmod 0600 /etc/am-ntfy/env'
      vars:
        amntfy_env: |
          NTFY_URL={{ ntfy_base_url }}/{{ ntfy_topic }}
          PORT={{ monitoring_amntfy_port }}
      no_log: true
      changed_when: true

    - name: Install the am-ntfy systemd unit (hardened, DynamicUser)
      ansible.builtin.shell: >
        echo '{{ amntfy_unit | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'cat > /etc/systemd/system/am-ntfy.service'
      vars:
        amntfy_unit: |
          [Unit]
          Description=Alertmanager -> ntfy webhook bridge
          After=network-online.target
          [Service]
          ExecStart=/usr/bin/python3 /usr/local/bin/am-ntfy.py
          EnvironmentFile=/etc/am-ntfy/env
          DynamicUser=yes
          NoNewPrivileges=yes
          ProtectSystem=strict
          ProtectHome=yes
          PrivateTmp=yes
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
      changed_when: true

    - name: Drop the alert rules into the CT
      ansible.builtin.shell: >
        echo '{{ lookup('file', playbook_dir + '/../files/monitoring/alert-rules.yml') | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'mkdir -p /etc/prometheus/rules && cat > /etc/prometheus/rules/homelab.yml'
      changed_when: true

    - name: Drop the recording rules into the CT
      ansible.builtin.shell: >
        echo '{{ lookup('file', playbook_dir + '/../files/monitoring/recording-rules.yml') | b64encode }}' | base64 -d |
        pct exec {{ monitoring_ctid }} -- bash -c 'mkdir -p /etc/prometheus/rules && cat > /etc/prometheus/rules/recording.yml'
      changed_when: true

    - name: Validate alert + recording rules + Alertmanager config before (re)starting
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          set -e
          promtool check config /etc/prometheus/prometheus.yml
          promtool check rules /etc/prometheus/rules/homelab.yml /etc/prometheus/rules/recording.yml
          amtool check-config /etc/prometheus/alertmanager.yml
        '
      changed_when: false

    - name: Enable + (re)start the services
      ansible.builtin.shell: |
        pct exec {{ monitoring_ctid }} -- bash -c '
          systemctl daemon-reload
          systemctl enable --now prometheus grafana-server pve-exporter unpoller prometheus-alertmanager am-ntfy prometheus-blackbox-exporter >/dev/null 2>&1
          systemctl restart prometheus grafana-server pve-exporter unpoller prometheus-alertmanager am-ntfy prometheus-blackbox-exporter
        '
      changed_when: true

    - name: Set the Grafana admin password (when one was given)
      ansible.builtin.command: >
        pct exec {{ monitoring_ctid }} --
        grafana-cli --homepath /usr/share/grafana admin reset-admin-password {{ grafana_admin_password }}
      no_log: true
      changed_when: true
      when: grafana_admin_password | length > 0

    - name: Report
      ansible.builtin.debug:
        msg:
          - "Monitoring CT {{ monitoring_ctid }} up at {{ monitoring_ip | regex_replace('/.*$', '') }}."
          - "Grafana :3000 (admin) / Prometheus :9090/targets — LAN/Tailscale only."
          - "Dashboards as code: Infrastructure (Node Exporter, Proxmox) + UniFi (unpoller set). allowUiUpdates=on — export live edits back to the repo."
          - "Targets: prometheus + node (x{{ (monitoring_node_targets | length) + 3 }}, including manual-update VMs) + pve (x{{ monitoring_pve_nodes | length }})."
          - "Alerting: Prometheus rules -> Alertmanager :{{ monitoring_alertmanager_port }} -> am-ntfy :{{ monitoring_amntfy_port }} -> ntfy."
          - "Alerts at :9090/alerts, AM at :{{ monitoring_alertmanager_port }}. Test: amtool alert add (see runbook)."
