---
# Configure unattended SECURITY upgrades on Debian guest LXCs and Ubuntu VMs (ADR-015).
#
# The first play discovers running CTs on every Proxmox host. The later plays register the normal
# Ubuntu VMs directly: mgmt-vm, Vaultwarden, Jellyseerr, and Actual. HAOS remains excluded because it
# is an appliance, not an apt target. Idempotent — re-run any time; this installs/configures policy
# but does not force an immediate upgrade. The first automatic run is the next 12:00 local.
#
#   cd homelab/ansible && ansible-playbook playbooks/provision-patching.yml --ask-become-pass
#
# Each apt guest gets: unattended-upgrades (the distro's security-only default origins), no
# auto-reboot, the apt-daily-upgrade timer pinned to 12:00, and an ntfy OnFailure hook (topic from
# group_vars, no_log). Per-guest config = ansible/files/patching/setup-unattended.sh.
#
- name: Configure unattended security upgrades on guest LXCs
  hosts: proxmox
  gather_facts: false

  tasks:
    - name: Discover running guest CTs on this host
      ansible.builtin.shell: |
        set -o pipefail
        pct list | awk 'NR>1 && $2=="running" {print $1}'
      args:
        executable: /bin/bash
      register: guest_ctids
      changed_when: false

    - name: Report which CTs will be configured
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: configuring unattended-upgrades on CTs {{ guest_ctids.stdout_lines | default([]) }}"

    - name: Configure unattended security upgrades inside each guest CT
      ansible.builtin.shell: >
        echo '{{ lookup('file', playbook_dir + '/../files/patching/setup-unattended.sh') | b64encode }}'
        | base64 -d
        | pct exec {{ item }} -- bash -s -- '{{ ntfy_base_url }}/{{ ntfy_topic }}' '{{ patching_timezone | default("") }}'
      loop: "{{ guest_ctids.stdout_lines | default([]) }}"
      loop_control:
        label: "CT {{ item }}"
      no_log: true
      changed_when: true

    - name: Report
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}: {{ guest_ctids.stdout_lines | default([]) | length }} guest CT(s) set to auto-apply SECURITY updates at 12:00, no auto-reboot."
          - "First automatic run: next 12:00 local. Failures push to ntfy. Non-security updates: monthly window (manual)."

- name: Register Ubuntu VM patch targets
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Register mgmt-vm locally
      ansible.builtin.add_host:
        name: mgmt-vm-patching
        ansible_connection: local
        groups: _ubuntu_patch_targets
      changed_when: false

    - name: Register Vaultwarden VM
      ansible.builtin.add_host:
        name: vaultwarden-patching
        ansible_host: "{{ vaultwarden_ip | regex_replace('/.*$', '') }}"
        ansible_user: "{{ vaultwarden_ci_user | default('simon') }}"
        ansible_python_interpreter: /usr/bin/python3
        groups: _ubuntu_patch_targets
      changed_when: false

    - name: Register Jellyseerr VM
      ansible.builtin.add_host:
        name: jellyseerr-patching
        ansible_host: "{{ jellyseerr_ip | regex_replace('/.*$', '') }}"
        ansible_user: "{{ jellyseerr_ci_user | default('simon') }}"
        ansible_python_interpreter: /usr/bin/python3
        groups: _ubuntu_patch_targets
      changed_when: false

    - name: Register Actual Budget VM
      ansible.builtin.add_host:
        name: actual-patching
        ansible_host: "{{ actual_ip | regex_replace('/.*$', '') }}"
        ansible_user: "{{ actual_ci_user | default('simon') }}"
        ansible_python_interpreter: /usr/bin/python3
        groups: _ubuntu_patch_targets
      changed_when: false
      when: actual_enabled | default(false) | bool

- name: Configure unattended security upgrades on Ubuntu VMs
  hosts: _ubuntu_patch_targets
  gather_facts: true
  become: true

  tasks:
    - name: Refuse non-Ubuntu VM targets
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
        fail_msg: "{{ inventory_hostname }} is not Ubuntu; refusing to apply the Ubuntu VM patch policy."

    - name: Configure unattended security upgrades
      ansible.builtin.script:
        cmd: >-
          {{ playbook_dir }}/../files/patching/setup-unattended.sh
          {{ (ntfy_base_url ~ '/' ~ ntfy_topic) | quote }}
          {{ patching_timezone | default('') | quote }}
      no_log: true
      changed_when: true

    - name: Report Ubuntu VM policy
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}: SECURITY updates will auto-apply at 12:00 local; automatic reboot is disabled."
          - "Non-security packages, Docker image changes, and any required reboot remain deliberate monthly maintenance."
