[defaults]
inventory = inventory/hosts.ini
stdout_callback = yaml
# Homelab is a trusted LAN; skip the interactive host-key prompt on first connect.
# (known_hosts is still written; this only avoids the yes/no prompt.)
host_key_checking = False
# Don't create .retry files littering the repo.
retry_files_enabled = False

[ssh_connection]
pipelining = True
