# Prometheus alert rules for the homelab (ADR-013).
# Loaded by Prometheus via rule_files: /etc/prometheus/rules/*.yml and routed to
# Alertmanager -> the am-ntfy bridge -> ntfy. This is a STATIC file: it is copied
# into the CT verbatim (lookup('file') | b64encode), so the {{ $labels }} below are
# Prometheus templating, NOT Ansible/Jinja — do not edit them as Jinja.
#
# Keep this conservative: alerts that are definitely correct against the metrics we
# already scrape (node_exporter, pve-exporter, up). Tune thresholds against reality.
groups:
  - name: homelab
    rules:
      # Any scrape target unreachable (node/pve/unifi/home-assistant/prometheus self).
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus has failed to scrape {{ $labels.job }} at {{ $labels.instance }} for 5m."

      # Real filesystems under 10% free (excludes pseudo/overlay/squashfs mounts).
      - alert: NodeFilesystemSpaceLow
        expr: >
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|ramfs"}
           / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|ramfs"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk: {{ $labels.instance }} {{ $labels.mountpoint }} <10% free"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is below 10% free space."

      # Host memory nearly exhausted.
      - alert: NodeMemoryHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low memory: {{ $labels.instance }} <10% available"
          description: "{{ $labels.instance }} has had under 10% memory available for 10m."

      # A PVE storage (datastore/rpool/local-*) running out — pve-exporter metrics.
      # max by(id): clustered nodes (apophis+carter) each report cluster-wide storage,
      # so every clustered storage has 2 identical series — aggregate to one alert per id.
      - alert: PVEStorageFull
        expr: >
          max by(id) (
            pve_disk_usage_bytes{id=~"storage/.*"}
            / pve_disk_size_bytes{id=~"storage/.*"}
          ) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PVE storage >90% full: {{ $labels.id }}"
          description: "{{ $labels.id }} is over 90% used."

      # A guest (LXC/VM) is stopped/crashed while its Proxmox host is still up + scraped.
      # `up`/TargetDown only covers explicitly-scraped targets (the hosts, the HA VM, UniFi) —
      # the service LXCs aren't scraped, so this catches e.g. Tailscale or Technitium dying on
      # their own. min by(id): the clustered nodes (apophis+carter) each report cluster-wide
      # pve_up, so apophis guests (qemu/100, qemu/200, lxc/110) have 2 series — aggregating to
      # one prevents a double-alert. min is safe: a genuinely-stopped guest is 0 on BOTH
      # exporters (min=0 → fires once), and min behaves identically to the old bare `== 0` for a
      # whole-host outage.
      # VERIFIED 2026-06-25 (single-guest stop of CT 117): min by(id) fires exactly ONE alert
      # (the bare expr yields 2 series in steady state → would double-alert), and it fires as
      # soon as ANY exporter reports the guest down (good detection; max would wait for both).
      # CAVEAT still open (needs a real node-down drill): the old comment assumed a whole-HOST
      # outage made pve_up go ABSENT (leaving it to TargetDown). Under clustering that no longer
      # holds — the surviving node's exporter keeps reporting the dead node's guests, possibly as
      # 0. So an apophis outage MAY now fire GuestDown for its guests alongside Node/TargetDown.
      # Confirm next time a node is down and tighten (e.g. join to the guest's home node) if noisy.
      # id map: lxc/110 tailscale · 111 technitium · 112 pbs · 113 ha-backup-share · 114 monitoring
      #         · 115 glance · 116 infra-portal · 117 technitium2 · 120 jellyfin · 121 qbittorrent
      #         · 122 prowlarr · 123 sonarr · 124 radarr
      #         · qemu/100 mgmt-vm · 118 vaultwarden · 125 jellyseerr · 200 home-assistant.
      - alert: GuestDown
        expr: min by(id) (pve_up{id=~"lxc/.*|qemu/.*"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox guest down: {{ $labels.id }}"
          description: "Guest {{ $labels.id }} has pve_up=0 — stopped/crashed for 5m (deduplicated across cluster exporters)."

      # pvesr replication health — the manual-failover safety net (ADR-009). VM 200 (HA) is
      # replicated apophis->carter every 15 min (job 200-0); if that silently stops, a failover
      # would start HA from a STALE or absent snapshot. pve-exporter exports these only from the
      # SOURCE node's exporter (one series per job); max by(id) future-proofs the failback
      # direction (carter->apophis) and is harmless now. NOTE: a real source-node (apophis)
      # outage legitimately stalls replication — that alert firing alongside a node outage is
      # expected (you're already failing over), not a false positive.
      - alert: ReplicationFailing
        expr: max by(id) (pve_replication_failed_syncs) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Proxmox replication job {{ $labels.id }} failing"
          description: "pvesr job {{ $labels.id }} has failed its last sync(s) for 15m — the manual-failover copy is going stale. Check `pvesr status` on the source node."
      - alert: ReplicationStale
        expr: (time() - max by(id) (pve_replication_last_sync_timestamp_seconds)) > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Proxmox replication job {{ $labels.id }} stale (>1h)"
          description: "pvesr job {{ $labels.id }} has not completed a sync in over 1h (runs every 15 min) — replication may be stopped; the failover copy is stale. Check `pvesr status`."

      # Home Assistant is the automation hub — alert FASTER than the generic 5m TargetDown.
      # up{job="home-assistant"}==0 means HA's /api/prometheus is unreachable: VM down, HA
      # crashed, or the scrape token broke. This is the reliable HA-down signal even on a
      # whole-apophis outage (where GuestDown's pve_up goes ABSENT, not 0). A planned apophis
      # reboot WILL trip this (HA lives there) — silence it during host maintenance:
      #   pct exec 114 -- amtool silence add alertname=HomeAssistantDown --duration=30m --comment="apophis maintenance"
      - alert: HomeAssistantDown
        expr: up{job="home-assistant"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Home Assistant unreachable (2m)"
          description: "Prometheus can't scrape Home Assistant (up=0) for 2m — HA VM down, HA crashed, or the metrics token broke. Automations may be offline."

      # Zigbee2MQTT bridge offline while HA itself is UP — the silent gap that hid an
      # 8h overnight outage on 2026-06-21 (SLZB-06 coordinator went EHOSTUNREACH at 00:19,
      # Z2MQTT crash-looped and stayed dead with no auto-restart). HomeAssistantDown does
      # NOT catch this: HA was healthy, only the Zigbee bridge was down, so every
      # zigbee automation silently stopped firing. Signal is the bridge connectivity
      # sensor Z2MQTT exports to HA (binary_sensor.zigbee2mqtt_bridge_connection_state):
      #   · ==0  -> bridge published offline (MQTT LWT) while the broker stayed up.
      #   · absent while HA up -> sensor went "unavailable" (HA drops the series); the
      #     `unless` clause catches that WITHOUT firing during a whole-HA outage (which
      #     HomeAssistantDown already owns).
      # SERIES SOURCE: two gates must both pass (verified 2026-06-22).
      #  1. HA SIDE (the blocker): HA's prometheus: integration is filtered to domains
      #     sensor+climate only, so binary_sensor is NOT exported. Add the entity to HA's
      #     filter.include_entities (configuration.yaml) or this rule stays inert:
      #       prometheus:
      #         filter:
      #           include_entities:
      #             - binary_sensor.zigbee2mqtt_bridge_connection_state
      #  2. PROM SIDE (done): the ADR-016 keep-list in provision-monitoring.yml has a pinned
      #     exception for this entity. Prefix is the default homeassistant_ (the hass_* names
      #     in retention are stale from an old namespace — ignore them).
      # After both, verify: homeassistant_binary_sensor_state{entity="binary_sensor.zigbee2mqtt_bridge_connection_state"}
      # NOTE: only the ==0 form is used (safe when absent — won't false-fire). When the
      # Z2MQTT add-on dies, its MQTT last-will publishes bridge/state=offline, so the
      # sensor reports "off" (=0) rather than going unavailable, so ==0 catches the outage.
      - alert: Zigbee2MQTTBridgeDown
        expr: homeassistant_binary_sensor_state{entity="binary_sensor.zigbee2mqtt_bridge_connection_state"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Zigbee2MQTT bridge offline (5m)"
          description: "The Zigbee2MQTT bridge has been offline for 5m while Home Assistant is up — Zigbee automations are not firing. Usual cause: SLZB-06 coordinator unreachable or the Z2MQTT add-on crashed without restart. Check the add-on log + that the coordinator is on the network."

      # The SLZB-06 Zigbee coordinator's TCP port is unreachable from the monitoring CT —
      # a blackbox tcp_connect probe of zigbee_coordinator_target (:6638). This is the ROOT
      # CAUSE signal for Zigbee outages and is INDEPENDENT of HA/Z2MQTT. CONFIRMED root cause
      # of the 2026-06-21 outage (unpoller data): the UniFi Cloud Gateway REBOOTED at ~14:20
      # UTC (00:19 local, UTC+10) — the SLZB-06 is on the gateway's own switch port 2 and HA
      # reaches it cross-VLAN THROUGH that gateway, so the reboot killed the link + routing for
      # ~2 min. Z2MQTT gave up retrying ~75s before the network recovered, then nothing
      # restarted it for 8h. UniFi link/port monitoring did NOT catch it (link was back in 2
      # min; Z2MQTT stayed dead) — only this app-layer probe does. probe_success=0 => TCP
      # connect failed; if the blackbox exporter itself is down the job's up=0 is caught by
      # TargetDown. NOTE: cross-VLAN probe (.2 -> .4) — if it fires always, check the firewall.
      - alert: ZigbeeCoordinatorUnreachable
        expr: probe_success{job="blackbox-zigbee-coordinator"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Zigbee coordinator (SLZB-06) unreachable (2m)"
          description: "TCP probe of the SLZB-06 Zigbee coordinator has failed for 2m — the coordinator is off the network (usually a UniFi gateway reboot, since the SLZB-06 hangs off the gateway's switch port; also firmware/PoE/link). Z2MQTT will crash and Zigbee automations stop. The self-heal automation should recover it; if it persists, check the gateway + SLZB-06."

      # A backup group hasn't had a fresh backup within its own staleness budget
      # (homelab_backup_max_age_seconds, default 36h). Metrics come from the backup-hub
      # textfile collector (backup-freshness.sh / provision-backup-monitoring.yml, ADR-017):
      # PBS snapshot age per vm/ct group + HA native-backup age. A silently-failing backup
      # becomes visible here instead of at restore time.
      - alert: BackupStale
        expr: (time() - homelab_backup_last_success_timestamp_seconds) > homelab_backup_max_age_seconds
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Backup stale: {{ $labels.type }} {{ $labels.group }}"
          description: "No fresh {{ $labels.type }} backup for {{ $labels.group }} within its staleness budget — last success is older than expected."

      # The freshness collector itself stopped reporting (script/timer broken, or the
      # backup hub is down) — no homelab_backup_* series at all. Without this, a dead
      # collector would silently mask BackupStale.
      - alert: BackupAbsent
        expr: absent(homelab_backup_last_success_timestamp_seconds)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Backup freshness metrics missing"
          description: "No homelab_backup_last_success_timestamp_seconds series — backup-freshness.sh/timer on the backup hub may have failed."
