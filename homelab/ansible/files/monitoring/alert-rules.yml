# Prometheus alert rules for the homelab (ADR-013).
# Loaded by Prometheus via rule_files: /etc/prometheus/rules/*.yml and routed to
# Alertmanager -> the am-ntfy bridge -> ntfy. This is a STATIC file: it is copied
# into the CT verbatim (lookup('file') | b64encode), so the {{ $labels }} below are
# Prometheus templating, NOT Ansible/Jinja — do not edit them as Jinja.
#
# Keep this conservative: alerts that are definitely correct against the metrics we
# already scrape (node_exporter, pve-exporter, up). Tune thresholds against reality.
groups:
  - name: homelab
    rules:
      # Any scrape target unreachable (node/pve/unifi/home-assistant/prometheus self).
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus has failed to scrape {{ $labels.job }} at {{ $labels.instance }} for 5m."

      # Real filesystems under 10% free (excludes pseudo/overlay/squashfs mounts).
      - alert: NodeFilesystemSpaceLow
        expr: >
          (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|ramfs"}
           / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|ramfs"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk: {{ $labels.instance }} {{ $labels.mountpoint }} <10% free"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is below 10% free space."

      # Host memory nearly exhausted.
      - alert: NodeMemoryHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low memory: {{ $labels.instance }} <10% available"
          description: "{{ $labels.instance }} has had under 10% memory available for 10m."

      # A PVE storage (datastore/rpool/local-*) running out — pve-exporter metrics.
      - alert: PVEStorageFull
        expr: >
          (pve_disk_usage_bytes{id=~"storage/.*"}
           / pve_disk_size_bytes{id=~"storage/.*"}) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PVE storage >90% full: {{ $labels.id }}"
          description: "{{ $labels.id }} (scraped via {{ $labels.instance }}) is over 90% used."

      # A guest (LXC/VM) is stopped/crashed while its Proxmox host is still up + scraped.
      # `up`/TargetDown only covers explicitly-scraped targets (the hosts, the HA VM, UniFi) —
      # the service LXCs aren't scraped, so this catches e.g. Tailscale or Technitium dying on
      # their own. A whole-HOST outage instead makes these pve_up series go ABSENT (not 0) and is
      # caught by TargetDown on the node/pve job, so there's no double-alert.
      # id map: lxc/110 tailscale · 111 technitium · 112 pbs · 113 ha-backup-share · 114 monitoring
      #         · 115 glance · qemu/100 mgmt-vm · 200 home-assistant.
      - alert: GuestDown
        expr: pve_up{id=~"lxc/.*|qemu/.*"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox guest down: {{ $labels.id }}"
          description: "Guest {{ $labels.id }} (on {{ $labels.instance }}) has pve_up=0 — stopped/crashed for 5m while its host is up."

      # A backup group hasn't had a fresh backup within its own staleness budget
      # (homelab_backup_max_age_seconds, default 36h). Metrics come from the backup-hub
      # textfile collector (backup-freshness.sh / provision-backup-monitoring.yml, ADR-017):
      # PBS snapshot age per vm/ct group + HA native-backup age. A silently-failing backup
      # becomes visible here instead of at restore time.
      - alert: BackupStale
        expr: (time() - homelab_backup_last_success_timestamp_seconds) > homelab_backup_max_age_seconds
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Backup stale: {{ $labels.type }} {{ $labels.group }}"
          description: "No fresh {{ $labels.type }} backup for {{ $labels.group }} within its staleness budget — last success is older than expected."

      # The freshness collector itself stopped reporting (script/timer broken, or the
      # backup hub is down) — no homelab_backup_* series at all. Without this, a dead
      # collector would silently mask BackupStale.
      - alert: BackupAbsent
        expr: absent(homelab_backup_last_success_timestamp_seconds)
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Backup freshness metrics missing"
          description: "No homelab_backup_last_success_timestamp_seconds series — backup-freshness.sh/timer on the backup hub may have failed."
