# Draft Glance dashboard content for the homelab admin front-door.
# This is intentionally dashboard YAML, not provisioning logic. Keep real IPs in
# gitignored group_vars or local runtime config; committed examples use YOUR_*.
#
# Design: one quiet admin cockpit. Use monitor widgets only for HTTP(S) checks
# that Glance can reach. Use bookmarks for non-HTTP checks, procedures, and
# external consoles. Grafana owns graphs; Home Assistant owns household control.

server:
  host: 0.0.0.0
  port: 8080

branding:
  app-name: "Homelab"
  logo-text: "HL"
  hide-footer: true

theme:
  background-color: 220 12 10
  primary-color: 173 58 52
  positive-color: 142 48 48
  negative-color: 4 70 58
  contrast-multiplier: 1.08

pages:
  - name: Homelab
    columns:
      - size: small
        widgets:
          - type: bookmarks
            title: Runbooks
            groups:
              - title: Operate
                color: 173 58 52
                links:
                  - title: Plan
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/homelab/PLAN.md
                    description: Current phase, services, and backlog
                    icon: di:github-light
                  - title: Runbooks
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/homelab/docs/operations/runbooks.md
                    description: Health, restart, backup, recovery
                    icon: mdi:book-open-page-variant
                  - title: Decisions
                    url: https://github.com/osmondsimon-bit/homelab/tree/master/homelab/decisions
                    description: ADRs and rationale
                    icon: mdi:file-document-multiple
              - title: Next Actions
                color: 45 80 55
                links:
                  - title: Phase Gate
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/.claude/skills/phase-gate/SKILL.md
                    description: Closeout checklist before marking a phase done
                    icon: mdi:check-decagram
                  - title: Tech Radar
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/homelab/docs/tech-radar.md
                    description: Adopted, deferred, and skipped capabilities
                    icon: mdi:radar

          - type: monitor
            title: Backup Surface
            cache: 1m
            sites:
              - title: Proxmox Backup Server
                url: https://YOUR_PBS_IP:8007
                check-url: https://YOUR_PBS_IP:8007
                icon: di:proxmox-backup-server
                allow-insecure: true
                alt-status-codes: [401, 403]

          - type: bookmarks
            title: Recovery Checks
            groups:
              - title: Backups
                color: 142 48 48
                links:
                  - title: HA Backup Share
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/homelab/docs/operations/runbooks.md#backups-pbs--home-assistant--adr-012
                    description: Confirm HA partial backups land on the oneill share
                    icon: mdi:nas

      - size: full
        widgets:
          - type: monitor
            title: Core Services
            cache: 1m
            sites:
              - title: Home Assistant
                url: http://YOUR_HA_IP:8123
                icon: di:home-assistant
              - title: Technitium DNS
                url: http://YOUR_TECHNITIUM_IP:5380
                icon: di:technitium
                alt-status-codes: [401, 403]

          - type: monitor
            title: Observability
            cache: 1m
            sites:
              - title: Grafana
                url: http://YOUR_MONITORING_IP:3000
                check-url: http://YOUR_MONITORING_IP:3000/api/health
                icon: di:grafana
              - title: Prometheus
                url: http://YOUR_MONITORING_IP:9090
                check-url: http://YOUR_MONITORING_IP:9090/-/healthy
                icon: di:prometheus
              - title: Alertmanager
                url: http://YOUR_MONITORING_IP:9093
                check-url: http://YOUR_MONITORING_IP:9093/-/healthy
                icon: di:alertmanager

          - type: bookmarks
            title: Dashboards
            groups:
              - title: Grafana
                color: 28 86 55
                links:
                  - title: Node Exporter
                    url: http://YOUR_MONITORING_IP:3000
                    description: Import/dashboard 1860 or local equivalent
                    icon: di:grafana
                  - title: UniFi
                    url: http://YOUR_MONITORING_IP:3000
                    description: Network metrics dashboard
                    icon: di:unifi
                  - title: Home Assistant
                    url: http://YOUR_MONITORING_IP:3000
                    description: HA metrics dashboard
                    icon: di:home-assistant

      - size: small
        widgets:
          - type: monitor
            title: Infrastructure
            cache: 1m
            sites:
              - title: Proxmox apophis
                url: https://YOUR_PROXMOX_IP:8006
                check-url: https://YOUR_PROXMOX_IP:8006
                icon: di:proxmox
                allow-insecure: true
                alt-status-codes: [401, 403]
              - title: Proxmox oneill
                url: https://YOUR_NUC_IP:8006
                check-url: https://YOUR_NUC_IP:8006
                icon: di:proxmox
                allow-insecure: true
                alt-status-codes: [401, 403]
              - title: UniFi
                url: https://YOUR_GATEWAY_IP
                check-url: https://YOUR_GATEWAY_IP
                icon: di:unifi
                allow-insecure: true
                alt-status-codes: [401, 403]

          - type: bookmarks
            title: External Admin
            groups:
              - title: Admin Consoles
                color: 205 65 58
                links:
                  - title: Tailscale Admin
                    url: https://login.tailscale.com/admin/machines
                    description: Machines, routes, key expiry
                    icon: di:tailscale
                  - title: Cloudflare Zero Trust
                    url: https://one.dash.cloudflare.com/
                    description: Home Assistant tunnel
                    icon: di:cloudflare
                  - title: GitHub Repo
                    url: https://github.com/osmondsimon-bit/homelab
                    description: Public IaC and docs
                    icon: di:github-light

  - name: Build
    columns:
      - size: full
        widgets:
          - type: bookmarks
            title: Build Workbench
            groups:
              - title: Current IaC
                color: 173 58 52
                links:
                  - title: Ansible
                    url: https://github.com/osmondsimon-bit/homelab/tree/master/homelab/ansible
                    description: Current create + configure path for LXCs
                    icon: di:ansible
                  - title: Terraform
                    url: https://github.com/osmondsimon-bit/homelab/tree/master/homelab/terraform
                    description: Scaffolded; import deferred to cluster scale
                    icon: di:terraform
                  - title: Scripts
                    url: https://github.com/osmondsimon-bit/homelab/tree/master/homelab/scripts
                    description: Manual fallbacks and utilities
                    icon: mdi:script-text
              - title: Review Gates
                color: 45 80 55
                links:
                  - title: Infra Designer
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/.claude/agents/infra-designer.md
                    description: Review before new VM/LXC/network changes
                    icon: mdi:account-hard-hat
                  - title: Doc Auditor
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/.claude/agents/doc-auditor.md
                    description: Drift and placeholder checks
                    icon: mdi:file-search
                  - title: Continuity Reviewer
                    url: https://github.com/osmondsimon-bit/homelab/blob/master/.claude/agents/continuity-reviewer.md
                    description: Backups, RPO/RTO, restore drills
                    icon: mdi:lifebuoy

      - size: small
        widgets:
          - type: releases
            title: Watch Releases
            cache: 12h
            limit: 6
            collapse-after: 6
            show-source-icon: true
            repositories:
              - glanceapp/glance
              - prometheus/prometheus
              - grafana/grafana
              - tailscale/tailscale
