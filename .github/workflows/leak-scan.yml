# Full-tree privacy and secret gate for the public repository.
name: Full-tree leak scan

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

concurrency:
  group: leak-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tree:
    name: Scan tracked files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned Gitleaks
        shell: bash
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          chmod 0755 "${RUNNER_TEMP}/gitleaks"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Scan tracked tree
        run: homelab/scripts/git-precommit-scan.sh --full-tree --require-gitleaks
